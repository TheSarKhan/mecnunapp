services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: mecnun-postgres
    environment:
      POSTGRES_DB: mecnun
      POSTGRES_USER: mecnun
      POSTGRES_PASSWORD: mecnun
    ports:
      # Host port is 5433, not 5432 — other projects on this machine commonly hold the default.
      # Containers still reach each other on 5432 over the compose network.
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mecnun -d mecnun"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: mecnun-redis
    ports:
      # 6380 on the host for the same reason as postgres above.
      - "6380:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build:
      # Repo root, not ./backend — the image also needs /ai (persona prompts, corpus).
      context: .
      dockerfile: backend/Dockerfile
    container_name: mecnun-backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/mecnun
      SPRING_DATASOURCE_USERNAME: mecnun
      SPRING_DATASOURCE_PASSWORD: mecnun
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-dev-only-secret-change-me-please-32-bytes-min}
      # Empty key is supported: the app falls back to canned replies instead of failing to start.
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.0-flash}
      REVENUECAT_WEBHOOK_SECRET: ${REVENUECAT_WEBHOOK_SECRET:-}
      ADMOB_SSV_PUBLIC_KEY: ${ADMOB_SSV_PUBLIC_KEY:-}
    ports:
      # Override with BACKEND_PORT when something else on the machine already holds 8080.
      - "${BACKEND_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:8080/actuator/health | grep -q UP"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 40s

  adminer:
    image: adminer:latest
    container_name: mecnun-adminer
    depends_on:
      - postgres
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    ports:
      # 8081 is left free on purpose — that is Metro's default port for `expo start`.
      - "8082:8080"

volumes:
  postgres-data:
  redis-data:
