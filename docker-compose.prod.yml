# Prod stack — bu server BİR NEÇƏ layihəni daşıyır (starsoft, fanus, fintech, testup).
# Buradakı hər qərar "qonşuya dəymə" prinsipindən çıxır:
#
#   * `name: mecnun`   — compose layihə adı sabitlənib; volume və şəbəkə adları bununla
#                        prefikslənir, başqa stack-in resursuna dəymir.
#   * postgres/redis   — host portu YOXDUR. Serverdə 5432/5433/5440 və 6379/6380/6390 artıq
#                        tutulub; həm də bazanı internetə açmağın səbəbi yoxdur, backend ona
#                        daxili şəbəkədən çatır.
#   * adminer YOXDUR   — dev alətidir. Prod-da açıq qoysaq, internetdə parolsuz DB konsoludur.
#   * portlar 8090/3100 — 8080 (starsoft), 8081, 8085 (fintech) və 3000 (başqa Next app) doludur.
#
# Dev üçün `docker-compose.yml` işlədilir; bu fayl yalnız serverdədir.
name: mecnun

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: mecnun-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: mecnun
      POSTGRES_USER: mecnun
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD tələb olunur}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mecnun -d mecnun"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: mecnun-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    # `image` + `build` birlikdə: serverdə mənbədən qurmaq da, CI-nin GHCR-ə itələdiyi
    # image-i çəkmək də eyni fayl ilə işləsin.
    image: ${BACKEND_IMAGE:-mecnun-backend:local}
    build:
      # Repo kökü, ./backend deyil — image-ə /ai (persona promptları, korpus) da lazımdır.
      context: .
      dockerfile: backend/Dockerfile
    container_name: mecnun-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # `docker` YOX: o profil test hesabı seed edir və DEBUG loglayır. Bax application-prod.yml.
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/mecnun
      SPRING_DATASOURCE_USERNAME: mecnun
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD tələb olunur}
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      # Dev default-u burada YOXDUR: prod-da zəif imza açarı ilə qalxmaqdansa qalxmamaq yaxşıdır.
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET tələb olunur (>=32 bayt)}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-3.5-flash}
      REVENUECAT_WEBHOOK_SECRET: ${REVENUECAT_WEBHOOK_SECRET:-}
      ADMOB_SSV_VERIFICATION_ENABLED: ${ADMOB_SSV_VERIFICATION_ENABLED:-true}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      # Brauzerdən gələn sorğular üçün. Web başqa origin-ə köçsə burası da yenilənməlidir.
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:?CORS_ALLOWED_ORIGINS tələb olunur}
    ports:
      # YALNIZ 127.0.0.1: yeganə açıq giriş nginx-dir (mecnun.sarkhan.az). Portu 0.0.0.0-a
      # açsaq, IP:port ilə həm HTTPS-i, həm Cloudflare-i keçmək olardı.
      - "127.0.0.1:${BACKEND_PORT:-8090}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:8080/actuator/health | grep -q UP"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 40s

  web:
    image: ${WEB_IMAGE:-mecnun-web:local}
    build:
      context: ./frontend
      args:
        # DİQQƏT: build zamanı bundle-a həkk olunur, runtime-da oxunmur. Dəyəri dəyişmək
        # üçün image YENİDƏN qurulmalıdır — konteyneri restart etmək kifayət etmir.
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?NEXT_PUBLIC_API_URL tələb olunur}
    container_name: mecnun-web
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      # Backend ilə eyni səbəb — bax yuxarı.
      - "127.0.0.1:${WEB_PORT:-3100}:3000"

volumes:
  postgres-data:
  redis-data:
