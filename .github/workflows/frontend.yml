name: frontend

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - "docker-compose.prod.yml"
      - ".github/workflows/frontend.yml"
  pull_request:
    paths:
      - "frontend/**"
      - "docker-compose.prod.yml"
      - ".github/workflows/frontend.yml"
  workflow_dispatch:

defaults:
  run:
    working-directory: frontend

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # Next 16 minimumu 20.9-dur. Mobil ilə ORTAQ versiya işlətmirik — Expo öz versiyasına
          # bağlıdır və birini qaldırmaq digərini sındıra bilər.
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - name: Build
        # Build zamanı bundle-a həkk olunur; CI-də yalnız build-in keçdiyini yoxlayırıq,
        # real dəyər deploy addımında verilir.
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080
        run: npm run build

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: check
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-server
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: SSH açarını qur
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Mənbəni serverə köçür
        working-directory: .
        run: |
          rsync -az --delete \
            --exclude 'node_modules' --exclude '.git' --exclude '.next' --exclude '.env' \
            -e "ssh -i ~/.ssh/id_ed25519" \
            frontend docker-compose.prod.yml \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/opt/mecnun/"

      - name: Yenidən qur və qaldır
        # `NEXT_PUBLIC_API_URL` serverdəki .env-dən gəlir və build arg kimi ötürülür —
        # runtime dəyişəni deyil, ona görə hər deploy image-i yenidən qurur.
        working-directory: .
        run: |
          ssh -i ~/.ssh/id_ed25519 "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            'cd /opt/mecnun && docker compose -f docker-compose.prod.yml up -d --build web'

      - name: Cavab verdiyini yoxla
        working-directory: .
        run: |
          ssh -i ~/.ssh/id_ed25519 "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" '
            for i in $(seq 1 20); do
              code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3100/ || echo 000)
              if [ "$code" = "200" ] || [ "$code" = "307" ]; then echo "web cavab verir ($code)"; exit 0; fi
              sleep 3
            done
            echo "web 60s ərzində cavab vermədi"; docker logs --tail 50 mecnun-web; exit 1
          '
