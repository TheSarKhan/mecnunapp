spring:
  application:
    name: mecnun-backend
  profiles:
    default: local
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/mecnun}
    username: ${SPRING_DATASOURCE_USERNAME:mecnun}
    password: ${SPRING_DATASOURCE_PASSWORD:mecnun}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}
  jackson:
    default-property-inclusion: non_null

server:
  port: 8080
  error:
    include-message: always

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha
  api-docs:
    path: /v3/api-docs

mecnun:
  jwt:
    # CHANGE IN PRODUCTION. HS256 requires >= 32 bytes.
    secret: ${JWT_SECRET:dev-only-secret-change-me-please-32-bytes-min}
    access-ttl-seconds: 3600
    refresh-ttl-seconds: 2592000
  limits:
    free-daily-messages: 20
    premium-daily-messages: 500
    timezone: Asia/Baku
  ads:
    # Brief v2 §8: +5–10 mesaj / baxış, gündə maksimum 3 baxış.
    messages-per-reward: 5
    max-rewards-per-day: 3
  gemini:
    # Empty key is a supported state: replies fall back to canned text and a warning is logged,
    # so the app still boots and the rest of the product stays testable.
    api-key: ${GEMINI_API_KEY:}
    model: ${GEMINI_MODEL:gemini-2.0-flash}
    temperature: 1.0
    max-output-tokens: 400
    timeout-seconds: 30
    history-limit: 20
    max-bubbles: 3
  ai:
    # Boş — promptlar classpath-dən oxunur. local profilində ../ai ilə override olunur.
    dir: ${MECNUN_AI_DIR:}
  revenuecat:
    webhook-secret: ${REVENUECAT_WEBHOOK_SECRET:}
  admob:
    ssv-public-key: ${ADMOB_SSV_PUBLIC_KEY:}

logging:
  level:
    com.mecnun: DEBUG
