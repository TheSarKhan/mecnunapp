spring:
  application:
    name: mecnun-backend
  profiles:
    default: local
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/mecnun}
    username: ${SPRING_DATASOURCE_USERNAME:mecnun}
    password: ${SPRING_DATASOURCE_PASSWORD:mecnun}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}
  jackson:
    default-property-inclusion: non_null

server:
  port: 8080
  error:
    include-message: always

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha
  api-docs:
    path: /v3/api-docs

mecnun:
  cors:
    # Vergüllə ayrılmış origin siyahısı (pattern qəbul edir). Dev-də Next.js `frontend/`.
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  jwt:
    # CHANGE IN PRODUCTION. HS256 requires >= 32 bytes.
    secret: ${JWT_SECRET:dev-only-secret-change-me-please-32-bytes-min}
    access-ttl-seconds: 3600
    refresh-ttl-seconds: 2592000
  limits:
    free-daily-messages: 20
    premium-daily-messages: 500
    timezone: Asia/Baku
  ads:
    # Brief v2 §8: +5–10 mesaj / baxış, gündə maksimum 3 baxış.
    messages-per-reward: 5
    max-rewards-per-day: 3
  gemini:
    # Empty key is a supported state: replies fall back to canned text and a warning is logged,
    # so the app still boots and the rest of the product stays testable.
    api-key: ${GEMINI_API_KEY:}
    # Pinned, not the gemini-flash-latest alias — persona prompts are calibrated against a
    # specific model and a moving alias would drift the voice with no code change to blame.
    model: ${GEMINI_MODEL:gemini-3.5-flash}
    temperature: 1.0
    max-output-tokens: 400
    # 0 = model cavabdan əvvəl "düşünmür". Söndürülməsə düşünmə token büdcəsini yeyir və
    # cavab söz ortasında kəsilir — ölçülüb: 400-dən 380 token düşünməyə gedirdi.
    thinking-budget: 0
    timeout-seconds: 30
    history-limit: 20
    max-bubbles: 3
  ai:
    # Boş — promptlar classpath-dən oxunur. local profilində ../ai ilə override olunur.
    dir: ${MECNUN_AI_DIR:}
  memory:
    # İstifadəçiyə görünən "sessiya" anlayışı yoxdur — ChatGPT modeli (roadmap §6).
    extract-every-n-messages: 10
    quiet-sweep-minutes: 30
    sweep-interval-ms: 300000
    recall-limit: 8
    max-messages-per-extraction: 40
    max-facts-per-user: 200
  revenuecat:
    webhook-secret: ${REVENUECAT_WEBHOOK_SECRET:}
  admob:
    # Açarı biz qurmuruq — Google dərc edir, hər çağırış key_id ilə hansını işlətdiyini bildirir.
    verifier-keys-url: https://www.gstatic.com/admob/reward/verifier-keys.json
    # Yalnız lokal test üçün false. Söndürülsə URL-i bilən hər kəs özünə limit yaza bilər.
    ssv-verification-enabled: ${ADMOB_SSV_VERIFICATION_ENABLED:true}
  google:
    # Mobil app-in aldığı ID token bu audience üçün yoxlanılır.
    client-id: ${GOOGLE_CLIENT_ID:}

logging:
  level:
    com.mecnun: DEBUG
