# docker-compose daxilində — servis adları ilə bağlanır.
spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/mecnun}
    username: ${SPRING_DATASOURCE_USERNAME:mecnun}
    password: ${SPRING_DATASOURCE_PASSWORD:mecnun}
  data:
    redis:
      host: ${SPRING_REDIS_HOST:redis}
      port: ${SPRING_REDIS_PORT:6379}

mecnun:
  dev:
    # Lokal iş üçün bilinən hesab. Prod profilində qəti qurulmamalıdır.
    seed-test-user: true
